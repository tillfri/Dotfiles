format = '[ $user ]($style)'

[directory]
style = "bg:red fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "

[git_branch]
symbol = "’Éś"
style = "bg:peach"
format = '[[ $symbol $branch ](fg:crust bg:peach)]($style)'

[git_status]
style = "bg:peach"
format = '[[($all_status$ahead_behind )](fg:crust bg:peach)]($style)'


[git_state]
style = "bg:peach"
format = '[\($state( $progress_current of $progress_total)\)]($style)'


[nodejs]
symbol = "Ņ£ś"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Ņś× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Ņśł"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
detect_extensions = []
detect_files = []
style = "bg:sapphire fg:crust"
format = '[${symbol}($virtualenv )(\(${version}\) )]($style)'
version_format = '${major}.${minor}'

[haskell]
symbol = "Ņś¤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'
only_with_files = false

[conda]
symbol = " ’äī "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[container]
symbol = "’īł"
style = "bg:sapphire"
format = '[ $symbol Container]($style) '

[azure]
disabled = true
format = "on [$symbol($subscription)($username)]($style) "
symbol = "¾░Āģ "
style = "blue bold"

[time]
disabled = false
time_format = "%R"
style = "fg:#c5c8c6"
format = '[ $time ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Ņ½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

